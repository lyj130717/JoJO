<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>죠죠의 기묘한 모험.</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1> 죠죠의 기묘한 모험. <!--블로그 제목을 한글로 변경-->
    <nav>
      <ul>
        
        <li><a href="#">인물 소개</a></li> <!-- 원하는 이름으로 변경 -->
        <li><a href="#">부 소개</a></li> <!-- 원하는 이름으로 변경 -->
        
      </ul>
    </nav>

  <main>
    <section class="featured-post">
      <div class="post-info">
        <h2>죠죠.</h2>
        <p>죠죠.</p>
      </div>

    </section>
    <div class="slideWrap">
        <div class="slideshow">
            <img src="./myImg/img1.jpeg" alt="Featured Post 1">
            <img src="./myImg/img2.jpeg" alt="Featured Post 2">
            <img src="./myImg/img3.jpeg" alt="Featured Post 3">
            <img src="./myImg/img4.jpeg" alt="Featured Post 4">
            <img src="./myImg/img5.jpeg" alt="Featured Post 5">
            <img src="./myImg/img6.jpeg" alt="Featured Post 6">
        </div>
    </div>






     <!-- 게시글 입력 폼 추가 -->
     <div class="post-form">
        <h2>게시글 작성</h2>
        <input type="text" id="post-title" placeholder="제목">
        <textarea id="post-content" placeholder="내용"></textarea>
        <button id="submit-btn">게시하기</button>
      </div>
  
      <!-- 게시글 목록을 담을 컨테이너 -->
      <div id="post-container">
      </div>


    <section class="blog-posts">
      <!-- Blog post cards go here -->

    </section>
  </main>




  <aside class="sidebar">
    <h2>Online Users</h2>
    <ul id="online-users">
      <!-- Online user list will be dynamically generated by JavaScript -->
    </ul>
  </aside>
 
  

  <footer>
    <p>&copy 2023 여행 블로그. All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
